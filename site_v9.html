# Ollama

Start building with open models.

## Download

### macOS

```shell
curl -fsSL https://ollama.com/install.sh | sh
```

or [download manually](https://ollama.com/download/Ollama.dmg)

### Windows

```shell
irm https://ollama.com/install.ps1 | iex
```

or [download manually](https://ollama.com/download/OllamaSetup.exe)

### Linux

```shell
curl -fsSL https://ollama.com/install.sh | sh
```

[Manual install instructions](https://docs.ollama.com/linux#manual-install)

### Docker

The official [Ollama Docker image](https://hub.docker.com/r/ollama/ollama) `ollama/ollama` is available on Docker Hub.

### Libraries

- [ollama-python](https://github.com/ollama/ollama-python)
- [ollama-js](https://github.com/ollama/ollama-js)

### Community

- [Discord](https://discord.gg/ollama)
- [𝕏 (Twitter)](https://x.com/ollama)
- [Reddit](https://reddit.com/r/ollama)

## Get started

```
ollama
```

You'll be prompted to run a model or connect Ollama to your existing agents or applications such as `claude`, `codex`, `openclaw` and more.

### Coding

To launch a specific integration:

```
ollama launch claude
```

Supported integrations include [Claude Code](https://docs.ollama.com/integrations/claude-code), [Codex](https://docs.ollama.com/integrations/codex), [Droid](https://docs.ollama.com/integrations/droid), and [OpenCode](https://docs.ollama.com/integrations/opencode).

### AI assistant

Use [OpenClaw](https://docs.ollama.com/integrations/openclaw) to turn Ollama into a personal AI assistant across WhatsApp, Telegram, Slack, Discord, and more:

```
ollama launch openclaw
```

### Chat with a model

Run and chat with [Gemma 3](https://ollama.com/library/gemma3):

```
ollama run gemma3
```

See [ollama.com/library](https://ollama.com/library) for the full list.

See the [quickstart guide](https://docs.ollama.com/quickstart) for more details.

## REST API

Ollama has a REST API for running and managing models.

```
curl http://localhost:11434/api/chat -d '{
  "model": "gemma3",
  "messages": [{
    "role": "user",
    "content": "Why is the sky blue?"
  }],
  "stream": false
}'
```

See the [API documentation](https://docs.ollama.com/api) for all endpoints.

### Python

```
pip install ollama
```

```python
from ollama import chat

response = chat(model='gemma3', messages=[
  {
    'role': 'user',
    'content': 'Why is the sky blue?',
  },
])
print(response.message.content)
```

### JavaScript

```
npm i ollama
```

```javascript
import ollama from "ollama";

const response = await ollama.chat({
  model: "gemma3",
  messages: [{ role: "user", content: "Why is the sky blue?" }],
});
console.log(response.message.content);
```

      ["人工智能", "AI"]
    ];
    const SECRET_POPUP_ANIMATION_MS = 500;
    const themeQuery = typeof window.matchMedia === "function"
      ? window.matchMedia("(prefers-color-scheme: dark)")
      : null;
    let chineseSourcePromise = null;
    let activeSecretTrigger = null;
    let secretPopupEventsBound = false;
    let profileThemeEventsBound = false;

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function slugify(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/[`~!@#$%^&*()+=|{}[\]:;"'<>?,./\\]/g, "")
        .replace(/\s+/g, "-");
    }

    function findMatching(text, startIndex, openChar, closeChar) {
      let depth = 0;

      for (let index = startIndex; index < text.length; index += 1) {
        const char = text[index];

        if (char === openChar) {
          depth += 1;
        } else if (char === closeChar) {
          depth -= 1;

          if (depth === 0) {
            return index;
          }
        }
      }

      return -1;
    }

    function remapGenericLinkLabel(token) {
      const match = token.match(/^(!?)\[([^\]]*)\]\(([^)]+)\)$/);

      if (!match) {
        return token;
      }

      const bang = match[1];
      const label = match[2];
      const url = match[3];
      const nextLabel = GENERIC_LINK_LABELS_ZH[label] || label;
      return `${bang}[${nextLabel}](${url})`;
    }

    function protectMarkdownSyntax(line) {
      const tokens = [];
      let tokenIndex = 0;
      const text = line.replace(/(!?\[[^\]]*\]\([^)]+\)|`[^`]+`)/g, (token) => {
        const placeholder = `[[[TOKEN_${tokenIndex}]]]`;
        const replacement = token.startsWith("[") || token.startsWith("![")
          ? remapGenericLinkLabel(token)
          : token;
        tokens.push([placeholder, replacement]);
        tokenIndex += 1;
        return placeholder;
      });

      return { text, tokens };
    }

    function restoreMarkdownSyntax(line, tokens) {
      let restored = line;

      tokens.forEach(([placeholder, replacement]) => {
        restored = restored.replaceAll(placeholder, replacement);
      });

      return restored;
    }

    function applyChineseFixups(text) {
      let nextText = text;

      CHINESE_FIXUPS.forEach(([from, to]) => {
        nextText = nextText.replaceAll(from, to);
      });

      return nextText;
    }

    async function requestTranslation(text) {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(text)}`;
      const response = await fetch(url);

      if (!response.ok) {
        throw new Error(`Translation request failed with status ${response.status}`);
      }

      const data = await response.json();
      return data[0].map((part) => part[0]).join("");
    }

    async function translateProtectedLines(lines) {
      const output = [];
      const joiner = "\n[[[CODEX_SPLIT]]]\n";
      const batchSize = 24;

      for (let index = 0; index < lines.length; index += batchSize) {
        const batch = lines.slice(index, index + batchSize);

        try {
          const translatedBlock = await requestTranslation(batch.join(joiner));
          const pieces = translatedBlock
            .split("[[[CODEX_SPLIT]]]")
            .map((item) => item.replace(/^\n+|\n+$/g, ""));

          if (pieces.length !== batch.length) {
            throw new Error("Translated batch could not be split safely");
          }

          output.push(...pieces);
        } catch (error) {
          for (const line of batch) {
            output.push((await requestTranslation(line)).trim());
          }
        }
      }

      return output;
    }

    async function translateMarkdownToChinese(markdown) {
      const lines = markdown.split(/\r?\n/);
      const translatedLines = new Array(lines.length);
      const pending = [];
      let inCodeBlock = false;

      lines.forEach((line, index) => {
        if (/^```/.test(line)) {
          translatedLines[index] = line;
          inCodeBlock = !inCodeBlock;
          return;
        }

        if (inCodeBlock || !line.trim() || isRawHtmlStart(line)) {
          translatedLines[index] = line;
          return;
        }

        if (Object.prototype.hasOwnProperty.call(EXACT_LINE_MAP_ZH, line)) {
          translatedLines[index] = EXACT_LINE_MAP_ZH[line];
          return;
        }

        pending.push({
          index,
          original: line,
          protected: protectMarkdownSyntax(line)
        });
      });

      const translatedText = await translateProtectedLines(
        pending.map((item) => item.protected.text)
      );

      pending.forEach((item, index) => {
        const restored = restoreMarkdownSyntax(translatedText[index], item.protected.tokens);
        translatedLines[item.index] = applyChineseFixups(restored);
      });

      return translatedLines.join("\n");
    }

    async function getChineseSource() {
      const cachedSource = storage.get(STORAGE_KEYS.chineseSource);

      if (cachedSource) {

    }

    function tryParseLinkOrImage(text, startIndex, isImage) {
      const labelStart = isImage ? startIndex + 1 : startIndex;

      if (text[labelStart] !== "[") {
        return null;
      }

      const labelEnd = findMatching(text, labelStart, "[", "]");

      if (labelEnd === -1 || text[labelEnd + 1] !== "(") {
        return null;
      }

      const urlStart = labelEnd + 1;
      const urlEnd = findMatching(text, urlStart, "(", ")");

      if (urlEnd === -1) {
        return null;
      }

      const label = text.slice(labelStart + 1, labelEnd);
      const url = text.slice(urlStart + 1, urlEnd);

      return {
        html: isImage
          ? `<img src="${escapeHtml(url)}" alt="${escapeHtml(label)}" />`
          : `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${renderInline(label)}</a>`,
        nextIndex: urlEnd + 1
      };
    }

    function renderInline(text) {
      let output = "";
      let index = 0;

      while (index < text.length) {
        const char = text[index];

        if (char === "`") {
          const endIndex = text.indexOf("`", index + 1);

          if (endIndex !== -1) {
            output += `<code>${escapeHtml(text.slice(index + 1, endIndex))}</code>`;
            index = endIndex + 1;
            continue;
          }
        }

        if (char === "!" && text[index + 1] === "[") {
          const image = tryParseLinkOrImage(text, index, true);

          if (image) {
            output += image.html;
            index = image.nextIndex;
            continue;
          }
        }

        if (char === "[") {
          const link = tryParseLinkOrImage(text, index, false);

          if (link) {
            output += link.html;
            index = link.nextIndex;
            continue;
          }
        }

        output += escapeHtml(char);
        index += 1;
      }

      return output;
    }

    function isRawHtmlStart(line) {
      return /^\s*<\/?[a-zA-Z][^>]*>/.test(line);
    }

    function isBlockStart(line) {
      return (
        /^\s*$/.test(line) ||
        /^```/.test(line) ||
        /^#{1,6}\s+/.test(line) ||
        /^-\s+/.test(line) ||
        /^>\s?/.test(line) ||
        isRawHtmlStart(line)
      );
    }

    function renderMarkdown(markdown) {
      const lines = markdown.split(/\r?\n/);
      const html = [];
      let index = 0;

      while (index < lines.length) {
        const line = lines[index];

        if (/^\s*$/.test(line)) {
          index += 1;
          continue;
        }

        if (/^```/.test(line)) {
          const language = line.slice(3).trim();
          const block = [];
          index += 1;

          while (index < lines.length && !/^```/.test(lines[index])) {
            block.push(lines[index]);
            index += 1;
          }

          if (index < lines.length) {
            index += 1;
          }

        const className = language ? ` class="language-${escapeHtml(language)}"` : "";
          html.push(`<div class="code-block"><button class="copy-button" type="button" aria-label="复制代码">${COPY_ICON}</button><pre><code${className}>${escapeHtml(block.join("\n"))}</code></pre></div>`);
          continue;
        }

        if (/^#{1,6}\s+/.test(line)) {
          const level = line.match(/^#+/)[0].length;
          const text = line.slice(level).trim();
          const id = slugify(text);
          html.push(`<h${level} id="${id}">${renderInline(text)}</h${level}>`);
          index += 1;
          continue;
        }

        if (/^-\s+/.test(line)) {
          const items = [];

          while (index < lines.length && /^-\s+/.test(lines[index])) {
            items.push(`<li>${renderInline(lines[index].replace(/^-\s+/, ""))}</li>`);
            index += 1;
          }

          html.push(`<ul>${items.join("")}</ul>`);
          continue;
        }

        if (/^>\s?/.test(line)) {
          const quote = [];

          while (index < lines.length && /^>\s?/.test(lines[index])) {
            quote.push(lines[index].replace(/^>\s?/, "").trim());
            index += 1;
          }

          html.push(`<blockquote><p>${renderInline(quote.join(" "))}</p></blockquote>`);
          continue;
        }

        if (isRawHtmlStart(line)) {
          const block = [];

          while (index < lines.length) {
            block.push(lines[index]);
            index += 1;

            if (index >= lines.length || /^\s*$/.test(lines[index])) {
              break;
            }
          }

          html.push(block.join("\n"));
          continue;
        }

        const paragraph = [];

        while (index < lines.length && !isBlockStart(lines[index])) {
          paragraph.push(lines[index].trim());
          index += 1;
        }

        html.push(`<p>${renderInline(paragraph.join(" "))}</p>`);
      }

      return html.join("\n");
    }

    function buildLocalChineseFallback(markdown) {
      return markdown

    async function copyText(text) {
      const clipboard = (window.navigator && window.navigator.clipboard)
        || (typeof navigator !== "undefined" ? navigator.clipboard : null);

      if (clipboard && clipboard.writeText) {
        await clipboard.writeText(text);
        return;
      }

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "absolute";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      if (typeof document.execCommand === "function") {
        document.execCommand("copy");
      }
      textarea.remove();
    }

    function positionProfileLink(gallery, card, linkShell) {
      if (!gallery || !card || !linkShell) {
        return;

      const page = document.querySelector(".page");
      const pageRect = page ? page.getBoundingClientRect() : document.documentElement.getBoundingClientRect();
      const galleryRect = gallery.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      const margin = 14;
      const availableWidth = Math.max(132, pageRect.width - margin * 2);

      linkShell.style.maxWidth = `${availableWidth}px`;

      const linkWidth = Math.min(linkShell.scrollWidth, availableWidth);
      const avatarCenter = (cardRect.left + cardRect.width / 2) - galleryRect.left;
      const minCenter = pageRect.left + margin + linkWidth / 2 - galleryRect.left;
      const maxCenter = pageRect.right - margin - linkWidth / 2 - galleryRect.left;
      const clampedCenter = Math.min(Math.max(avatarCenter, minCenter), maxCenter);
      const originShift = avatarCenter - clampedCenter;

      gallery.style.setProperty("--link-shell-left", `${clampedCenter}px`);
      gallery.style.setProperty("--link-origin-shift", `${originShift}px`);
    }

    function getProfileAssetSource(image) {

    function loadProfileCardImage(card) {
      const image = card.querySelector(".profile-avatar__image");

      if (!image) {
        return;
      }

      const nextSource = getProfileAssetSource(image);

      if (!nextSource) {
        card.classList.remove("is-loaded", "is-link-open");
        return;
      }

      if (image.dataset.currentSrc === nextSource && card.classList.contains("is-loaded")) {
        return;
      }

      const requestId = `${Date.now()}-${Math.random()}`;
      const loader = new Image();

      card.dataset.loadRequestId = requestId;

      loader.decoding = "async";
      loader.onload = () => {
        if (card.dataset.loadRequestId !== requestId) {
          return;
        }

        image.src = nextSource;
        image.dataset.currentSrc = nextSource;
        card.classList.add("is-loaded");
      };
      loader.onerror = () => {
        if (card.dataset.loadRequestId !== requestId) {
          return;
        }

        if (!image.dataset.currentSrc) {
          image.removeAttribute("src");
          card.classList.remove("is-loaded", "is-link-open");
        }
      };
      loader.src = nextSource;
    }

    function createWaterDrops(trigger, popover) {
      const triggerRect = trigger.getBoundingClientRect();
      const popoverRect = popover.getBoundingClientRect();
      
      // 弹窗中心
      const popoverCenterX = popoverRect.left + popoverRect.width / 2;
      const popoverCenterY = popoverRect.top + popoverRect.height / 2;
      
      // trigger中心
      const triggerCenterX = triggerRect.left + triggerRect.width / 2;
      const triggerCenterY = triggerRect.top + triggerRect.height / 2;
      
      // 创建15个水滴，更密集
      for (let i = 0; i < 15; i++) {
        const drop = document.createElement('div');
        drop.className = 'water-drop';
        
        // 随机方向和大小，更密集的分布
        const angle = (Math.PI * 2 * i) / 15 + (Math.random() - 0.5) * 0.3;
        const distance = 20 + Math.random() * 40;
        const dropX = Math.cos(angle) * distance;
        const dropY = Math.sin(angle) * distance;
        
        // 水滴大小 - 有大有小
        const dropSize = 4 + Math.random() * 8;
        
        // 设置起始位置为弹窗中心
        drop.style.left = popoverCenterX + 'px';
        drop.style.top = popoverCenterY + 'px';
        drop.style.width = dropSize + 'px';
        drop.style.height = dropSize + 'px';
        
        // 计算移向trigger的偏移，产生聚集的效果
        const targetX = triggerCenterX - popoverCenterX - (dropSize / 2) + (Math.random() - 0.5) * 10;
        const targetY = triggerCenterY - popoverCenterY - (dropSize / 2) + (Math.random() - 0.5) * 10;
        
        drop.style.setProperty('--drop-x', (targetX + dropX) + 'px');
        drop.style.setProperty('--drop-y', (targetY + dropY) + 'px');
        
        document.body.appendChild(drop);
        
        // 动画完成后删除
        drop.addEventListener('animationend', () => {
          drop.remove();
        });
      }
    }

    function enhanceScrollReveal() {
      const rendered = document.getElementById('rendered');
      if (!rendered) return;
      let lastScrollY = window.scrollY, scrollDir = 'down';
      window.addEventListener('scroll', () => {
        scrollDir = window.scrollY > lastScrollY ? 'down' : 'up';
        lastScrollY = window.scrollY;
      }, { passive: true });

      const targets = rendered.querySelectorAll('h2,h3,h4,p,li,blockquote,.code-block');
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const el = entry.target;
          if (entry.isIntersecting) {
            el.classList.remove('dir-down','dir-up','visible');
            void el.offsetWidth;
            el.classList.add(scrollDir === 'up' ? 'dir-up' : 'dir-down');
            el.style.animationDelay = (el.dataset.rd || 0) + 'ms';
            requestAnimationFrame(() => el.classList.add('visible'));
          } else {
            el.classList.remove('dir-down','dir-up','visible');
          }
        });
      }, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });

      let batchI = 0, lastTop = -9999;
      targets.forEach(el => {
        el.classList.add('reveal');
        const top = Math.round(el.getBoundingClientRect().top);
        batchI = Math.abs(top - lastTop) < 14 ? batchI + 1 : 0;
        lastTop = top;
        el.dataset.rd = batchI * 50;
        io.observe(el);
      });
    }

        upgradeDownloadLinks(); enhanceCodeBlocks();
        enhanceSecretPopups(); enhanceProfileCards(); removeLinkTitles();
        // 所有链接新窗口打开
        target.querySelectorAll('a[href]').forEach(a => {
          const href = a.getAttribute('href');
          if (href && !href.startsWith('#')) {
            a.setAttribute('target', '_blank');
            a.setAttribute('rel', 'noopener noreferrer');
          }
        });
        enhanceScrollReveal(); enhancePageLeave();
        document.body.classList.add('site-ready');
      } catch (err) {
        console.error(err);
        target.innerHTML = renderMarkdown(buildLocalChineseFallback(sourceEn));
        upgradeDownloadLinks(); enhanceCodeBlocks();
        enhanceSecretPopups(); enhanceProfileCards(); removeLinkTitles();
        enhanceScrollReveal();
        document.body.classList.add('site-ready');
      }
    }
    renderChinesePage();
  </script>
  <script src="./link-sweep.js"></script>
  <script src="./corner-easter.js"></script>
</body>
</html>
